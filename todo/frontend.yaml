apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-frontend-html
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Simple FE-BE App</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f3f4f6;
                color: #1f2937;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                text-align: center;
                max-width: 400px;
                width: 100%;
            }
            h1 {
                color: #2563eb;
                margin-bottom: 8px;
            }
            p {
                color: #4b5563;
                margin-bottom: 24px;
            }
            .status-box {
                background-color: #eff6ff;
                border: 1px solid #bfdbfe;
                border-radius: 8px;
                padding: 16px;
                font-size: 1.1rem;
                font-weight: 600;
                color: #1e40af;
            }
            .loading {
                color: #9ca3af;
            }
            .error {
                background-color: #fef2f2;
                border-color: #fca5a5;
                color: #991b1b;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Frontend App</h1>
            <p>GitOps Lab - Simple Frontend/Backend Integration</p>
            <div id="status" class="status-box loading">Fetching backend status...</div>
        </div>

        <script>
            fetch('/api')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerText = data.message || JSON.stringify(data);
                    statusDiv.classList.remove('loading');
                })
                .catch(error => {
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerText = 'Error connecting to Backend: ' + error.message;
                    statusDiv.classList.remove('loading');
                    statusDiv.classList.add('error');
                });
        </script>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-frontend-nginx
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api {
            proxy_pass http://todo-backend-svc;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.27
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: nginx-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: html-volume
        configMap:
          name: todo-frontend-html
      - name: nginx-volume
        configMap:
          name: todo-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend-svc
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  selector:
    app: todo-frontend
  ports:
  - port: 80
    targetPort: 80
