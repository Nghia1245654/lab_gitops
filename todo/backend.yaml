apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo:0.2.3
        args:
        - "-text"
        - '{"message": "Hello from Backend API!", "status": "success"}'
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend-svc
  namespace: todo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: todo-backend
  ports:
  - port: 80
    targetPort: 5678
